name: Check Skill Version Bump

on:
  pull_request:
    paths:
      - "**/SKILL.md"

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history to diff against base

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check version bumps
        run: python3 scripts/check-version-bump.py "origin/${{ github.base_ref }}"
